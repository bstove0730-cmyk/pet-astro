<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 宠物星盘 — 宣传海报</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Nunito', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0f0a1e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  
  .poster {
    width: 600px;
    min-height: 850px;
    background: linear-gradient(160deg, #0f0a1e 0%, #1a1040 40%, #2d1b69 70%, #0f0a1e 100%);
    border-radius: 24px;
    padding: 40px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  
  /* Stars */
  .poster::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: 
      radial-gradient(1.5px 1.5px at 50px 80px, rgba(255,255,255,0.8), transparent),
      radial-gradient(1px 1px at 120px 40px, rgba(255,255,255,0.6), transparent),
      radial-gradient(1.5px 1.5px at 200px 100px, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 350px 60px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 450px 120px, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 80px 200px, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 500px 250px, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 300px 300px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 150px 350px, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 400px 400px, rgba(255,255,255,0.4), transparent),
      radial-gradient(2px 2px at 250px 500px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 550px 550px, rgba(255,255,255,0.6), transparent);
    pointer-events: none;
    z-index: 0;
  }
  
  /* Glow orbs */
  .glow-1 {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(192,132,252,0.15) 0%, transparent 70%);
    border-radius: 50%;
    z-index: 0;
  }
  
  .glow-2 {
    position: absolute;
    bottom: -80px;
    left: -80px;
    width: 250px;
    height: 250px;
    background: radial-gradient(circle, rgba(244,114,182,0.12) 0%, transparent 70%);
    border-radius: 50%;
    z-index: 0;
  }
  
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
  }
  
  /* Header section */
  .header-icon {
    font-size: 52px;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 20px rgba(192,132,252,0.3));
  }
  
  .title {
    font-size: 42px;
    font-weight: 900;
    background: linear-gradient(135deg, #c084fc, #f472b6, #fbbf24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  
  .subtitle {
    color: #a89bc2;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 24px;
    letter-spacing: 2px;
  }
  
  /* Divider */
  .divider {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #c084fc, transparent);
    margin-bottom: 24px;
  }
  
  /* Features */
  .features {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    margin-bottom: 24px;
  }
  
  .feature-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
  }
  
  .feature-icon {
    font-size: 24px;
    width: 36px;
    text-align: center;
  }
  
  .feature-text {
    color: #e0d6f0;
    font-size: 15px;
    font-weight: 600;
  }
  
  .feature-desc {
    color: #a89bc2;
    font-size: 13px;
  }
  
  /* QR Code section */
  .qr-section {
    text-align: center;
    margin: 16px 0;
  }
  
  .qr-code {
    width: 180px;
    height: 180px;
    border-radius: 16px;
    background: white;
    padding: 10px;
    display: inline-block;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  
  .qr-code img {
    width: 100%;
    height: 100%;
    border-radius: 8px;
    display: block;
  }
  
  .qr-label {
    color: #a89bc2;
    font-size: 13px;
    margin-top: 8px;
  }
  
  .scan-text {
    color: #fbbf24;
    font-size: 20px;
    font-weight: 800;
    margin: 8px 0;
  }
  
  /* Pet paw decoration */
  .paw-prints {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 16px 0;
    opacity: 0.3;
    font-size: 20px;
  }
  
  /* Sample pets */
  .sample-pets {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 8px 0;
  }
  
  .sample-pet {
    text-align: center;
  }
  
  .sample-pet .emoji {
    font-size: 32px;
  }
  
  .sample-pet .zodiac {
    font-size: 13px;
    color: #a89bc2;
    margin-top: 4px;
  }
  
  /* Badge */
  .badge {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(192,132,252,0.2), rgba(244,114,182,0.2));
    border: 1px solid rgba(192,132,252,0.2);
    color: #c084fc;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  
  /* Footer */
  .footer-text {
    color: #6b5f8a;
    font-size: 12px;
    text-align: center;
    margin-top: auto;
    padding-top: 16px;
  }
  
  .footer-text .highlight {
    color: #c084fc;
  }
  
  /* Shooting stars */
  .shooting-star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: shoot 3s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  
  .shooting-star:nth-child(1) { top: 15%; left: 70%; animation-delay: 0s; }
  .shooting-star:nth-child(2) { top: 8%; left: 40%; animation-delay: 1.5s; }
  
  @keyframes shoot {
    0% { transform: translate(0, 0); opacity: 0; }
    2% { opacity: 1; }
    6% { transform: translate(-80px, 80px); opacity: 1; }
    7% { opacity: 0; }
    100% { opacity: 0; }
  }
  
  @media (max-width: 640px) {
    .poster {
      width: 100%;
      padding: 28px 20px;
      border-radius: 16px;
    }
    .title { font-size: 32px; }
    .qr-code { width: 150px; height: 150px; }
  }
</style>
</head>
<body>

<div class="poster">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  
  <div class="content">
    <!-- Icon -->
    <div class="header-icon">🐾🌙✨</div>
    
    <!-- Title -->
    <div class="title">宠物星盘</div>
    <div class="subtitle">— 星星知道每个毛孩子的秘密 —</div>
    
    <div class="divider"></div>
    
    <!-- Badge -->
    <div class="badge">🐶🐱 狗猫通用 · 免费在线</div>
    
    <!-- Features -->
    <div class="features">
      <div class="feature-item">
        <div class="feature-icon">☀️</div>
        <div>
          <div class="feature-text">核心性格分析</div>
          <div class="feature-desc">了解毛孩子的性格底色</div>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">🌙</div>
        <div>
          <div class="feature-text">情感需求解读</div>
          <div class="feature-desc">知道它真正需要什么</div>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">🌅</div>
        <div>
          <div class="feature-text">行为模式洞察</div>
          <div class="feature-desc">理解它为什么这样做</div>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">💡</div>
        <div>
          <div class="feature-text">相处秘籍</div>
          <div class="feature-desc">根据性格给出相处建议</div>
        </div>
      </div>
    </div>
    
    <!-- Sample pets with zodiac -->
    <div class="badge" style="font-size:12px;">✨ 2025最新星象 · 专业天文引擎 ✨</div>
    
    <!-- QR Code -->
    <div class="qr-section">
      <div class="qr-code">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://diane-curriculum-unlimited-had.trycloudflare.com" alt="QR Code">
      </div>
      <div class="scan-text">📱 扫码测一测</div>
      <div class="qr-label">看看你家毛孩子是什么星座性格</div>
    </div>
    
    <!-- Paw prints -->
    <div class="paw-prints">🐾　✨　🐾　✨　🐾</div>
    
    <!-- Footer -->
    <div class="footer-text">
      由 <span class="highlight">🦊 星野 AI 占星师</span> 倾情打造<br>
      输入出生时间 · 解锁专属星盘
    </div>
  </div>
</div>

</body>
</html>
