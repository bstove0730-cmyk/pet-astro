<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐾 宠物星盘</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  
  :root {
    --bg: #0f0a1e;
    --card-bg: rgba(255,255,255,0.06);
    --accent: #c084fc;
    --accent2: #f472b6;
    --gold: #fbbf24;
    --text: #f0e6ff;
    --text-secondary: #a89bc2;
    --radius: 20px;
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Nunito', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  /* Stars background */
  .stars {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: 
      radial-gradient(2px 2px at 20px 30px, #eee, transparent),
      radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
      radial-gradient(1px 1px at 90px 40px, #fff, transparent),
      radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.6), transparent),
      radial-gradient(2px 2px at 180px 20px, #eee, transparent),
      radial-gradient(1px 1px at 220px 100px, #fff, transparent),
      radial-gradient(1px 1px at 270px 50px, rgba(255,255,255,0.7), transparent),
      radial-gradient(2px 2px at 310px 90px, #eee, transparent),
      radial-gradient(1px 1px at 350px 30px, #fff, transparent),
      radial-gradient(1px 1px at 400px 70px, rgba(255,255,255,0.5), transparent);
    background-size: 400px 120px;
    animation: twinkle 4s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }
  
  @keyframes twinkle {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
  }
  
  .container {
    position: relative;
    z-index: 1;
    max-width: 420px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }
  
  /* Header */
  .header {
    text-align: center;
    padding: 30px 0 20px;
  }
  
  .header-icon {
    font-size: 48px;
    margin-bottom: 8px;
    animation: float 3s ease-in-out infinite;
  }
  
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  
  .header h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  .header p {
    color: var(--text-secondary);
    font-size: 14px;
    margin-top: 4px;
  }
  
  /* Card */
  .card {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    padding: 24px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    margin-bottom: 16px;
  }
  
  .card-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  /* Form */
  .form-group {
    margin-bottom: 16px;
  }
  
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  
  .form-group input, .form-group select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    transition: all 0.2s;
    outline: none;
  }
  
  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(192, 132, 252, 0.2);
  }
  
  .form-group input::placeholder {
    color: rgba(255,255,255,0.25);
  }
  
  .form-group select option {
    background: #1a1230;
    color: var(--text);
  }
  
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  
  /* Species selector */
  .species-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  
  .species-btn {
    padding: 14px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: var(--text-secondary);
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  
  .species-btn:hover {
    border-color: rgba(192, 132, 252, 0.3);
    background: rgba(192, 132, 252, 0.05);
  }
  
  .species-btn.active {
    border-color: var(--accent);
    background: rgba(192, 132, 252, 0.12);
    color: var(--text);
  }
  
  .species-btn .emoji {
    font-size: 28px;
    display: block;
    margin-bottom: 4px;
  }
  
  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  
  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(192, 132, 252, 0.3);
  }
  
  .submit-btn:active {
    transform: translateY(0);
  }
  
  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }
  
  /* Result area */
  #result-area {
    display: none;
    animation: fadeInUp 0.6s ease;
  }
  
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .result-header {
    text-align: center;
    padding: 20px 0 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 20px;
  }
  
  .result-pet-name {
    font-size: 24px;
    font-weight: 800;
    color: var(--gold);
  }
  
  .result-pet-breed {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  
  /* Zodiac wheel mini */
  .zodiac-mini {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 16px 0;
  }
  
  .zodiac-item {
    text-align: center;
    padding: 10px 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    flex: 1;
  }
  
  .zodiac-item .label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 2px;
  }
  
  .zodiac-item .sign {
    font-size: 22px;
  }
  
  .zodiac-item .name {
    font-size: 12px;
    font-weight: 600;
    margin-top: 2px;
  }
  
  /* Section */
  .section {
    margin: 16px 0;
    padding: 16px;
    border-radius: 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
  }
  
  .section-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .section-body {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
  }
  
  .trait-tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(192,132,252,0.15), rgba(244,114,182,0.15));
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  
  /* Planets grid */
  .planets-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  
  .planet-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
  }
  
  .planet-icon {
    font-size: 20px;
    width: 32px;
    text-align: center;
  }
  
  .planet-info {
    flex: 1;
  }
  
  .planet-name {
    font-size: 12px;
    color: var(--text-secondary);
  }
  
  .planet-sign {
    font-size: 14px;
    font-weight: 600;
  }
  
  /* Aspects */
  .aspect-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    margin-bottom: 6px;
    font-size: 13px;
  }
  
  .aspect-planets {
    font-weight: 600;
    min-width: 80px;
  }
  
  .aspect-name {
    color: var(--accent);
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(192,132,252,0.1);
    font-size: 12px;
  }
  
  .aspect-desc {
    color: var(--text-secondary);
    font-size: 12px;
  }
  
  /* Houses */
  .houses-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  
  .house-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    font-size: 13px;
  }
  
  .house-num {
    color: var(--text-secondary);
    font-size: 11px;
  }
  
  /* City autocomplete */
  .city-suggestions {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #1a1230;
    border: 1px solid rgba(192,132,252,0.3);
    border-radius: 12px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 100;
    margin-top: 4px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .city-item {
    padding: 10px 14px;
    cursor: pointer;
    font-size: 14px;
    color: #e0d6f0;
    transition: background 0.15s;
  }
  .city-item:hover {
    background: rgba(192,132,252,0.15);
  }
  .city-item:first-child {
    border-radius: 12px 12px 0 0;
  }
  .city-item:last-child {
    border-radius: 0 0 12px 12px;
  }
  
  /* Glow effect */
  .glow {
    position: relative;
  }
  
  .glow::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(192,132,252,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  
  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 30px;
  }
  
  .loading .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  
  .loading p {
    color: var(--text-secondary);
    font-size: 14px;
  }
  
  /* Footer */
  .footer {
    text-align: center;
    padding: 20px 0;
    color: var(--text-secondary);
    font-size: 12px;
    opacity: 0.6;
  }
  
  /* Error message */
  .error-msg {
    background: rgba(244, 67, 54, 0.1);
    border: 1px solid rgba(244, 67, 54, 0.2);
    border-radius: 12px;
    padding: 12px 16px;
    color: #ef5350;
    font-size: 14px;
    margin-top: 12px;
    display: none;
  }
  
  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
  
  /* Shooting star */
  .shooting-star {
    position: fixed;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: shoot 3s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  
  .shooting-star:nth-child(1) { top: 10%; left: 80%; animation-delay: 0s; }
  .shooting-star:nth-child(2) { top: 20%; left: 60%; animation-delay: 1.5s; }
  .shooting-star:nth-child(3) { top: 5%; left: 30%; animation-delay: 3s; }
  
  @keyframes shoot {
    0% { transform: translate(0, 0); opacity: 0; }
    1% { opacity: 1; }
    5% { transform: translate(-100px, 100px); opacity: 1; }
    6% { opacity: 0; }
    100% { opacity: 0; }
  }
</style>
</head>

<div class="stars"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-icon">🐾🌙</div>
    <h1>宠物星盘</h1>
    <p>看看星星怎么说你家毛孩子 ✨</p>
  </div>

  <!-- Input Form -->
  <div class="card" id="form-card">
    <div class="card-title">📝 填写宠物信息</div>
    
    <!-- Species -->
    <div class="card-title" style="font-size:13px; color:var(--text-secondary); margin-bottom:10px;">宠物种类</div>
    <div class="species-grid">
      <button class="species-btn active" data-species="dog" onclick="selectSpecies(this)">
        <span class="emoji">🐶</span>汪星人
      </button>
      <button class="species-btn" data-species="cat" onclick="selectSpecies(this)">
        <span class="emoji">🐱</span>喵星人
      </button>
    </div>
    
    <!-- Name -->
    <div class="form-group">
      <label>宝贝名字</label>
      <input type="text" id="pet-name" placeholder="比如：小可乐、lucky、咪咪…" maxlength="20">
    </div>
    
    <!-- Breed -->
    <div class="form-group">
      <label>品种（选填）</label>
      <input type="text" id="pet-breed" placeholder="比如：可卡布、英短、金毛…">
    </div>
    
    <!-- Birth date & time -->
    <div class="form-row">
      <div class="form-group">
        <label>出生日期</label>
        <input type="date" id="pet-birth-date">
      </div>
      <div class="form-group">
        <label>出生时间（选填）</label>
        <input type="time" id="pet-birth-time" value="12:00">
      </div>
    </div>
    
    <!-- Location -->
    <div class="form-group" style="position:relative;">
      <label>出生地（城市，选填）</label>
      <div style="position:relative;">
        <input type="text" id="pet-city-input" placeholder="🔍 搜索城市名..." autocomplete="off" oninput="searchCity(this.value)" onfocus="showCitySuggestions()">
        <input type="hidden" id="pet-city-lat" value="">
        <input type="hidden" id="pet-city-lon" value="">
        <input type="hidden" id="pet-city-name" value="">
        <div id="city-suggestions" class="city-suggestions"></div>
      </div>
    </div>
    
    <!-- Submit -->
    <button class="submit-btn" onclick="submitChart()">
      🌟 查看星盘
    </button>
    
    <div class="error-msg" id="error-msg"></div>
  </div>
  
  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>✨ 星野正在计算你的宝贝星盘...</p>
  </div>
  
  <!-- Result -->
  <div id="result-area">
    <div class="card" id="result-card">
      <!-- Result will be injected here -->
    </div>
    <button class="submit-btn" onclick="resetForm()" style="margin-top: 8px; background: rgba(255,255,255,0.08); color: var(--text);">
      🔄 再算一位
    </button>
  </div>
  
  <div class="footer">
    <div id="footer-user-count" style="margin-bottom:8px;">🐾 <span style="color:var(--accent);font-weight:700;">--</span> 位铲屎官已测</div>
    ✨ 每一只毛孩子都是星星送给人类的礼物 ✨<br>
    由 星野 AI 占星师 🐾 生成
  </div>
</div>

function searchCity(query) {
  const suggestions = document.getElementById('city-suggestions');
  if (!query || query.length < 1) { suggestions.style.display = 'none'; return; }
  
  const q = query.toLowerCase();
  const matches = CITY_DB.filter(c => c.n.includes(q)).slice(0, 10);
  
  if (matches.length === 0) { suggestions.style.display = 'none'; return; }
  
  suggestions.innerHTML = matches.map(c => 
    `<div class="city-item" onclick="selectCity('${c.n}', ${c.lat}, ${c.lon})">📍 ${c.n}</div>`
  ).join('');
  suggestions.style.display = 'block';
}

function selectCity(name, lat, lon) {
  document.getElementById('pet-city-input').value = name;
  document.getElementById('pet-city-lat').value = lat;
  document.getElementById('pet-city-lon').value = lon;
  document.getElementById('pet-city-name').value = name;
  document.getElementById('city-suggestions').style.display = 'none';
}

function showCitySuggestions() {
  const val = document.getElementById('pet-city-input').value;
  if (val) searchCity(val);
}

function getMoonSign(dateStr) {
  // Calculate moon's ecliptic longitude using astronomical algorithm
  // Accuracy ~2-3°, sufficient for zodiac sign determination
  const [y, m, d] = dateStr.split('-').map(Number);
  
  // Convert to Julian Day
  let year = y, month = m, day = d;
  if (month <= 2) { year--; month += 12; }
  const A = Math.floor(year / 100);
  const B = 2 - A + Math.floor(A / 4);
  const JD = Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day + B - 1524.5;
  
  const T = (JD - 2451545.0) / 36525;
  
  // Moon orbital elements (degrees)
  const Lp = 218.3165 + 481267.881342 * T;  // Mean longitude
  const M  = 134.9634 + 477198.867628 * T;  // Mean anomaly
  const Ms = 357.5291 + 35999.050291 * T;   // Sun mean anomaly
  const D  = 297.8502 + 445267.111403 * T;  // Elongation
  const F  = 93.2720 + 483202.017523 * T;   // Argument of latitude
  
  const d2r = Math.PI / 180;
  let lon = Lp;
  lon += 6.289 * Math.sin(M * d2r);
  lon += 1.274 * Math.sin((2*D - M) * d2r);
  lon += 0.658 * Math.sin((2*D) * d2r);
  lon += 0.214 * Math.sin((2*M) * d2r);
  lon -= 0.186 * Math.sin(Ms * d2r);
  lon -= 0.114 * Math.sin((2*F) * d2r);
  lon += 0.051 * Math.sin((2*M - 2*D) * d2r);
  lon -= 0.049 * Math.sin((2*D + M) * d2r);
  lon += 0.031 * Math.sin((M - 2*Ms) * d2r);
  lon += 0.031 * Math.sin((2*F + M) * d2r);
  
  lon = ((lon % 360) + 360) % 360;
  
  // Map longitude to zodiac sign
  const signs = ['白羊座','金牛座','双子座','巨蟹座','狮子座','处女座','天秤座','天蝎座','射手座','摩羯座','水瓶座','双鱼座'];
  return signs[Math.floor(lon / 30)];
}

function daysSince2020(y, m, d) {
  const base = new Date(2020, 0, 1);
  const target = new Date(y, m - 1, d);
  return Math.floor((target - base) / (1000 * 60 * 60 * 24));
}

function nearestLookup(table, dayNum) {
  // Binary search for nearest entry
  let lo = 0, hi = table.length - 1;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (table[mid][0] <= dayNum) lo = mid;
    else hi = mid;
  }
  const diffLo = Math.abs(table[lo][0] - dayNum);
  const diffHi = Math.abs(table[hi][0] - dayNum);
  return diffLo < diffHi ? table[lo] : table[hi];
}

function getPlanetSignFromLookup(name, y, m, d) {
  const dayNum = daysSince2020(y, m, d);
  const PLANET_NAMES = ['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn'];
  const col = PLANET_NAMES.indexOf(name) + 1;
  if (col < 1) return LOOKUP_SIGNS[0];
  const row = nearestLookup(PLANET_LOOKUP, dayNum);
  return LOOKUP_SIGNS[row[col]];
}

function getAscSignFromLookup(y, m, d) {
  const dayNum = daysSince2020(y, m, d);
  const row = nearestLookup(ASC_LOOKUP, dayNum);
  return LOOKUP_SIGNS[row[1]];
}

  const [y, m, d] = dateStr.split('-').map(Number);
  const planets = { Sun: sunSign, Moon: moonSign };

    try { planets[name] = getPlanetSignFromLookup(name, y, m, d); }

}

      // Save to localStorage for offline/non-backend use
      try {
        let reports = JSON.parse(localStorage.getItem('petAstroReports') || '[]');
        reports.unshift({
          id: 'LOCAL' + Date.now(),
          petName: name,
          species: species,
          breed: breed,
          birthDate: date,
          birthTime: time,
          city: cityName,
          sunSign: result.sunSign,
          moonSign: result.moonSign,
          risingSign: result.risingSign,
          createdAt: new Date().toISOString()
        });
        localStorage.setItem('petAstroReports', JSON.stringify(reports.slice(0, 100)));
      } catch(e) {}
      
      // Try to save to local backend (localhost)
      fetch('http://127.0.0.1:3477/api/report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          petName: name,
          species: species,
          breed: breed,
          birthDate: date,
          birthTime: time,
          city: cityName,
          latitude: cityLat ? parseFloat(cityLat) : null,
          longitude: cityLon ? parseFloat(cityLon) : null,
          sunSign: result.sunSign,
          sunDegree: result.sunDegree,
          moonSign: result.moonSign,
          moonDegree: result.moonDegree,
          risingSign: result.risingSign,
          risingDegree: result.risingDegree
        })
      }).catch(e => {});
      
      // Also try GitHub Pages (for web-only access)
      fetch('/api/report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          petName: name,
          species: species,
          breed: breed,
          birthDate: date,
          birthTime: time,
          city: cityName,
          sunSign: result.sunSign,
          moonSign: result.moonSign,
          risingSign: result.risingSign
        })
      }).catch(e => {});
      
    } catch (e) {
      showError('计算出错，请重试：' + e.message);
      getElement('form-card').style.display = 'block';
      getElement('loading').style.display = 'none';
    }
  }, 1200);
}

function renderResult(name, breed, date, time, cityName, cityLat, cityLon) {
  const [y, m, d] = date.split('-').map(Number);
  const sunData = getZodiacSign(m, d);
  const sunSign = sunData.name;
  const moonSign = getMoonSign(date);
  
  // Calculate rising sign using astronomical method
  let risingSign = '未知';
  const latDeg = parseFloat(cityLat) || 31.2;
  const lonDeg = parseFloat(cityLon) || 121.4;
  try {
    const asc = calcRisingSign(date, time, latDeg, lonDeg);
    risingSign = asc.sign;
  } catch(e) { risingSign = '白羊座'; }
  
  const person = personalityData[sunSign] || { trait: '独特小宝贝', desc: '', advice: '多陪伴、多关爱，它就是最幸福的小宝贝！' };
  const moonReading = moonReadings[moonSign] || '';
  const planets = formatPlanets(sunSign, moonSign, date);
  const aspects = generateAspects(planets);
  
  // Location display
  const locText = cityName || '未知地点';
  
  const result = { sunSign, sunDegree: 0, moonSign, moonDegree: 0, risingSign, risingDegree: 0, planets };
  
  // Planet icons
  const planetIcons = { '白羊座': '♈', '金牛座': '♉', '双子座': '♊', '巨蟹座': '♋', '狮子座': '♌', '处女座': '♍', '天秤座': '♎', '天蝎座': '♏', '射手座': '♐', '摩羯座': '♑', '水瓶座': '♒', '双鱼座': '♓' };
  
  const html = `
    <div class="result-header">
      <div style="font-size:36px; margin-bottom:8px;">${species === 'dog' ? '🐶' : '🐱'}</div>
      <div class="result-pet-name">${name}</div>
      <div class="result-pet-breed">${breed} · ${locText}</div>
      <div style="font-size:12px; color: var(--text-secondary); margin-top:4px;">📅 ${date} ${time || '未知时间'}</div>
    </div>
    
    <!-- Big 3 -->
    <div class="zodiac-mini">
      <div class="zodiac-item">
        <div class="label">☀️ 太阳</div>
        <div class="sign">${planetIcons[sunSign]}</div>
        <div class="name">${sunSign}</div>
      </div>
      <div class="zodiac-item">
        <div class="label">🌙 月亮</div>
        <div class="sign">${planetIcons[moonSign]}</div>
        <div class="name">${moonSign}</div>
      </div>
      <div class="zodiac-item">
        <div class="label">🌅 上升</div>
        <div class="sign">${planetIcons[risingSign]}</div>
        <div class="name">${risingSign}</div>
      </div>
    </div>
    
    <!-- Core Personality -->
    <div class="section">
      <div class="section-title">☀️ 核心性格 · 太阳${sunSign}</div>
      <div class="trait-tag">${elementData[sunSign]} · ${person.trait}</div>
      <div class="section-body">${person.desc}</div>
    </div>
    
    <!-- Emotional needs -->
    <div class="section">
      <div class="section-title">🌙 情感需求 · 月亮${moonSign}</div>
      <div class="trait-tag">${elementData[moonSign]}</div>
      <div class="section-body">${moonReading}</div>
    </div>
    
    <!-- Rising -->
    <div class="section">
      <div class="section-title">🌅 外在表现 · 上升${risingSign}</div>
      <div class="trait-tag">${elementData[risingSign]}</div>
      <div class="section-body">在生活中给人的第一印象，像${risingSign}一样——${person.desc}</div>
    </div>
    
    <!-- Planets -->
    <div class="section">
      <div class="section-title">🪐 行星分布</div>
      <div class="planets-grid">
        ${Object.entries(planets).map(([key, sign]) => {
          const signEmoji = planetIcons[sign] || '';
          return `<div class="planet-item">
            <div class="planet-icon">${planetEmoji[key]}</div>
            <div class="planet-info">
              <div class="planet-name">${planetNames[key]}</div>
              <div class="planet-sign">${signEmoji} ${sign}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
    
    <!-- Aspects -->
    <div class="section">
      <div class="section-title">🔗 重要相位</div>
      ${aspects.map(a => `<div class="aspect-item">
        <span class="aspect-planets">${a.p1}</span>
        <span class="aspect-name">${a.name}</span>
        <span class="aspect-planets">${a.p2}</span>
        <span class="aspect-desc">${a.desc}</span>
      </div>`).join('')}
    </div>
    
    <!-- Advice -->
    <div class="section" style="border-color: rgba(192,132,252,0.2); background: rgba(192,132,252,0.05);">
      <div class="section-title">💡 给 ${name} 的贴心建议</div>
      <div class="section-body">${person.advice}</div>
    </div>
    
    <!-- Footer note -->
    <div style="text-align:center; padding: 16px 0 4px; color: var(--text-secondary); font-size: 12px;">
      ✨ 星星知道每一个毛孩子的独特灵魂 ✨
    </div>
    <div id="user-count-display" style="text-align:center; color: var(--text-secondary); font-size: 13px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.06);">
      🐾 <span id="user-count-num">--</span> 位铲屎官已经测过了
    </div>
  `;
  
  // Fetch and update user count
  fetchUserCount();
  
  getElement('result-card').innerHTML = html;
  getElement('loading').style.display = 'none';
  getElement('result-area').style.display = 'block';
  getElement('result-area').scrollIntoView({ behavior: 'smooth' });
  
  return result;
}

async function fetchUserCount() {
  try {
    // Try backend API first
    const r = await fetch('/api/stats');
    const data = await r.json();
    if (data.success && data.stats) {
      const total = data.stats.total || 0;
      document.getElementById('footer-user-count').innerHTML = '🐾 <span style="color:var(--accent);font-weight:700;">' + total + '</span> 位铲屎官已测';
      const numEl = document.getElementById('user-count-num');
      if (numEl) numEl.textContent = total;
      return;
    }
  } catch(e) {}
  
  // Fallback: count from localStorage
  try {
    let reports = JSON.parse(localStorage.getItem('petAstroReports') || '[]');
    const total = reports.length;
    document.getElementById('footer-user-count').innerHTML = '🐾 <span style="color:var(--accent);font-weight:700;">' + total + '</span> 位铲屎官已测';
    const numEl = document.getElementById('user-count-num');
    if (numEl) numEl.textContent = total;
  } catch(e) {
    const el = document.getElementById('footer-user-count');
    if (el) el.innerHTML = '🐾 ✨ 星星知道每个毛孩子的秘密';
  }
}

setTimeout(fetchUserCount, 500);

function resetForm() {
  getElement('result-area').style.display = 'none';
  getElement('form-card').style.display = 'block';
  getElement('loading').style.display = 'none';
  getElement('form-card').scrollIntoView({ behavior: 'smooth' });
}

// Set default date to today
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date().toISOString().split('T')[0];
  getElement('pet-birth-date').value = today;
});
</script>
